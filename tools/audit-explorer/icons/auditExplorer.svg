<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0078D4" />
  <!-- Clipboard / audit list -->
  <rect x="9" y="8" width="14" height="16" rx="2" fill="white" opacity="0.9"/>
  <!-- Clipboard header -->
  <rect x="12" y="6" width="8" height="4" rx="1.5" fill="white"/>
  <!-- Lines representing data -->
  <line x1="12" y1="14" x2="20" y2="14" stroke="#0078D4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="17" x2="20" y2="17" stroke="#0078D4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="20" x2="17" y2="20" stroke="#0078D4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Magnifying glass -->
  <circle cx="21" cy="22" r="4" fill="#0078D4" stroke="white" stroke-width="1.5"/>
  <circle cx="21" cy="22" r="2" fill="none" stroke="white" stroke-width="1.2"/>
  <line x1="23.5" y1="24.5" x2="25.5" y2="26.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
